version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: scamshield_db
      POSTGRES_USER: scamshield
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scamshield -d scamshield_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://scamshield:password@db:5432/scamshield_db
      SECRET_KEY: change-me-to-a-random-64-char-string
      JWT_ALGORITHM: HS256
      JWT_EXPIRATION_MINUTES: 1440
      CORS_ORIGINS: "http://localhost:5500,http://127.0.0.1:5500,http://localhost:3000,http://localhost:80"

  frontend:
    image: nginx:alpine
    ports:
      - "5500:80"
    volumes:
      - ./assets:/usr/share/nginx/html:ro
    depends_on:
      - backend

volumes:
  pgdata:
